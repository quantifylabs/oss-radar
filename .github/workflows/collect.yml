name: Collect & Deploy

on:
  schedule:
    # Every 6 hours: midnight, 6am, noon, 6pm UTC
    - cron: "0 */6 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r collector/requirements.txt

      - name: Run collector
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: python collector/collect.py

      - name: Commit updated data
        run: |
          git config user.name "OSS Radar Bot"
          git config user.email "bot@aegismemory.com"
          git add site/data.json site/history.json
          git diff --staged --quiet || git commit -m "data: update $(date -u +%Y-%m-%dT%H:%M)"
          git push

  deploy:
    needs: collect
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest data
        run: git pull origin main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
